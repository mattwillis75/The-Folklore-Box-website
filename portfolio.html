<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | The Folklore Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;600&family=Spectral:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #000; --accent-red: #cc0000; }
        body { font-family: 'Lato', sans-serif; background: var(--bg-color); color: #fff; margin: 0; }
        
        /* Viewer Section */
        .viewer-section { height: 60vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        #main-viewer { max-height: 100%; max-width: 80%; object-fit: contain; transition: opacity 0.5s ease; cursor: crosshair; }
        
        /* Carousel Section */
        .carousel-container { position: relative; height: 30vh; display: flex; align-items: center; overflow: hidden; padding: 0 4rem; }
        .carousel-track { display: flex; align-items: center; gap: 2rem; transition: transform 0.5s ease; }
        
        .thumb { 
            height: 15vh; aspect-ratio: 1/1; object-fit: cover; cursor: pointer;
            transition: all 0.5s ease; border: 2px solid transparent; 
        }
        .thumb:not(.active) { transform: scale(0.6); opacity: 0.5; filter: grayscale(0.5); }
        .thumb.active { transform: scale(1.1); border-color: var(--accent-red); opacity: 1; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: #222; color: #fff; border: none; padding: 1rem; cursor: pointer; z-index: 10; }
        .prev-btn { left: 1rem; } .next-btn { right: 1rem; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.8s ease forwards; }
    </style>
</head>
<body>

    <main>
        <div class="viewer-section">
            <img id="main-viewer" src="" alt="Selected Artwork" class="fade-in">
        </div>

        <div class="carousel-container">
            <button class="nav-btn prev-btn" onclick="moveCarousel(-1)">&#10094;</button>
            <div class="carousel-track" id="track">
                <!-- Thumbnails injected by JS -->
            </div>
            <button class="nav-btn next-btn" onclick="moveCarousel(1)">&#10095;</button>
        </div>
    </main>

    <script>
        const works = [
            { src: './Portfolio-1.png', title: 'Cat People' },
            { src: './Portfolio-2.png', title: 'Forbidden Tome' },
            { src: './Portfolio-3.png', title: 'Devil\'s Hollow' },
            { src: './Portfolio-4.png', title: 'The Harvest' },
            { src: './Portfolio-5.png', title: 'The Gardener' }
            // Add all your Portfolio-X.png files here...
        ];

        const track = document.getElementById('track');
        const viewer = document.getElementById('main-viewer');
        let currentIndex = Math.floor(Math.random() * works.length);

        function init() {
            works.forEach((work, i) => {
                const img = document.createElement('img');
                img.src = work.src;
                img.className = 'thumb';
                img.onclick = () => selectWork(i);
                track.appendChild(img);
            });
            selectWork(currentIndex);
        }

        function selectWork(index) {
            currentIndex = index;
            const thumbs = document.querySelectorAll('.thumb');
            thumbs.forEach((t, i) => t.classList.toggle('active', i === index));
            
            viewer.style.opacity = 0;
            setTimeout(() => {
                viewer.src = works[index].src;
                viewer.style.opacity = 1;
            }, 300);
            
            // Center the selected thumb
            const offset = (window.innerWidth / 2) - (thumbs[index].offsetWidth / 2) - thumbs[index].offsetLeft;
            track.style.transform = `translateX(${offset}px)`;
        }

        function moveCarousel(dir) {
            currentIndex = (currentIndex + dir + works.length) % works.length;
            selectWork(currentIndex);
        }

        init();
    </script>
</body>
</html>
