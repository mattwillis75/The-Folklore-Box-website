<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Admin - The Folklore Box</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Spectral Font -->
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Load your saved data -->
    <script src="pins.js"></script>
    
    <style>
        body { margin: 0; padding: 0; display: flex; font-family: 'Spectral', serif; height: 100vh; overflow: hidden; background: #1a1a1a; color: #fff; }
        #sidebar { width: 350px; background: #2a2a2a; padding: 20px; box-sizing: border-box; overflow-y: auto; border-right: 1px solid #444; }
        #map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; background-color: #e5e3df; } 
        
        h2, h3 { margin-top: 0; }
        label { display: block; margin-top: 10px; font-size: 14px; color: #ccc; }
        input, select, textarea, button { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; font-family: inherit; }
        button { background: #d9381e; color: white; border: none; cursor: pointer; font-weight: 600; margin-top: 15px; border-radius: 4px; }
        button:hover { background: #b02a15; }
        .secondary-btn { background: #555; }
        .secondary-btn:hover { background: #333; }
        
        /* Semantic Zoom Town Labels (Styled for Admin visibility & interaction) */
        .town-label {
            color: #ffffff; 
            background-color: rgba(60, 60, 60, 0.85); 
            padding: 2px 8px 2px 4px;
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            font-family: 'Spectral', serif;
            font-size: 16px;
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap; 
            cursor: pointer; /* Keeps labels clickable in admin view */
            width: max-content; 
        }
        .town-dot { width: 8px; height: 8px; background: #d9381e; border-radius: 50%; display: inline-block; }

        /* Default pin styling (for cryptids/hauntings) */
        .custom-pin {
            width: 20px; height: 20px; background: #d9381e; border-radius: 50%; border: 2px solid #fff; cursor: pointer;
        }

        /* Custom Mobile Expand Button */
        .leaflet-control-expand {
            background: #d9381e; width: 34px; height: 34px; border-radius: 4px; cursor: pointer; border: 2px solid rgba(0,0,0,0.2); 
            background-image: url('data:image/svg+xml;utf8,<svg fill="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>'); 
            background-size: 20px; background-position: center; background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Map Admin</h2>
        <p style="font-size: 14px; color: #aaa;">Click on the map to add a new location, or click an existing marker to edit it.</p>
        
        <form id="editForm">
            <input type="hidden" id="editIndex">
            <input type="hidden" id="editType"> 
            
            <label>Marker Type</label>
            <select id="itemType">
                <option value="pin">Cryptid / Haunting (Pin)</option>
                <option value="town">Town / Label</option>
            </select>

            <label>Title</label>
            <input type="text" id="title" required>
            
            <div id="descContainer">
                <label>Description (Pins only)</label>
                <textarea id="description" rows="3"></textarea>
            </div>

            <div id="zoomContainer" style="display:none;">
                <label>Zoom Level (Towns only)</label>
                <select id="minZoom">
                    <option value="-4">-4 (Always Visible)</option>
                    <option value="-2">-2 (Zoom Level 1)</option>
                    <option value="-1">-1 (Zoom Level 2)</option>
                    <option value="0">0 (Zoom Level 3)</option>
                </select>
            </div>

            <label>Latitude</label>
            <input type="text" id="lat" required readonly style="background: #333; border: 1px solid #555; color: #aaa;">
            
            <label>Longitude</label>
            <input type="text" id="lng" required readonly style="background: #333; border: 1px solid #555; color: #aaa;">

            <button type="submit" id="saveBtn">Save to Map</button>
            <button type="button" id="deleteBtn" class="secondary-btn" style="display:none;">Delete Marker</button>
            <button type="button" id="cancelBtn" class="secondary-btn">Cancel / Clear Form</button>
        </form>
        
        <hr style="border-color: #444; margin: 20px 0;">
        <button type="button" id="exportBtn" style="background: #28a745;">Generate & Download pins.js</button>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 1. DATA INITIALIZATION ---
        let localPins = (typeof savedPins !== 'undefined') ? savedPins : [];
        let localTowns = (typeof savedTowns !== 'undefined') ? savedTowns : [];

        // --- 2. MAP SETUP ---
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -4,
            maxZoom: 1,
            zoomSnap: 0, 
            zoomControl: true
        });

        // Map Dimensions
        const mapWidth = 2400;
        const mapHeight = 1352;
        const bounds = [[0, 0], [mapHeight, mapWidth]];

        // *** BE SURE TO UPDATE THIS TO YOUR ACTUAL MAP IMAGE FILENAME ***
        L.imageOverlay('map-image.jpg', bounds).addTo(map);
        map.fitBounds(bounds);

        // Layer Groups
        const pinsLayerGroup = L.layerGroup().addTo(map);
        const townsLayerGroup = L.layerGroup().addTo(map);
        let semanticTowns = [];

        // --- 3. CUSTOM EXPAND BUTTON ---
        const ExpandControl = L.Control.extend({
            options: { position: 'topright' },
            onAdd: function () {
                const btn = L.DomUtil.create('div', 'leaflet-control-expand leaflet-bar');
                btn.title = "Force Landscape (Mobile)";
                L.DomEvent.on(btn, 'click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    if(screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(err => console.log('Orientation lock not supported'));
                    } else {
                        alert("Mobile expand trigger clicked!");
                    }
                });
                return btn;
            }
        });
        map.addControl(new ExpandControl());

        // --- 4. RENDER LOGIC ---
        function renderPins() {
            pinsLayerGroup.clearLayers();
            localPins.forEach((data, index) => {
                const icon = L.divIcon({ className: 'custom-pin', iconSize: [20, 20], iconAnchor: [10, 10] });
                const marker = L.marker([data.lat, data.lng], { icon: icon }).addTo(pinsLayerGroup);
                
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    populateSidebar(data, index, 'pin');
                });
            });
        }

        function renderTowns() {
            townsLayerGroup.clearLayers();
            semanticTowns = []; 
            
            localTowns.forEach((data, index) => {
                const iconHtml = `<div class="town-label"><span class="town-dot"></span>${data.title}</div>`;
                const textIcon = L.divIcon({ html: iconHtml, className: '', iconSize: null, iconAnchor: [4, 12] });
                
                const marker = L.marker([data.lat, data.lng], { icon: textIcon, zIndexOffset: -50 });
                
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    populateSidebar(data, index, 'town');
                });

                const requiredZoom = (data.minZoom !== undefined && data.minZoom !== null) ? Number(data.minZoom) : -4;
                semanticTowns.push({ marker: marker, minZoom: requiredZoom });
            });
            
            updateSemanticZoom();
        }

        // --- 5. SEMANTIC ZOOM ENGINE ---
        function updateSemanticZoom() {
            const currentZoom = map.getZoom();
            const baseZoom = map.getMinZoom(); 
            const zoomStepsIn = currentZoom - baseZoom;
            
            semanticTowns.forEach(item => {
                let requiredSteps = 0; 
                if (item.minZoom === -2) requiredSteps = 1; 
                if (item.minZoom === -1) requiredSteps = 2; 
                if (item.minZoom >= 0) requiredSteps = 3;   

                if (zoomStepsIn >= requiredSteps - 0.1) {
                    if (!townsLayerGroup.hasLayer(item.marker)) {
                        townsLayerGroup.addLayer(item.marker);
                    }
                } else {
                    if (townsLayerGroup.hasLayer(item.marker)) {
                        townsLayerGroup.removeLayer(item.marker);
                    }
                }
            });
        }
        map.on('zoomend', updateSemanticZoom);

        // --- 6. SIDEBAR & FORM LOGIC ---
        const form = document.getElementById('editForm');
        const deleteBtn = document.getElementById('deleteBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const itemTypeSelect = document.getElementById('itemType');

        itemTypeSelect.addEventListener('change', (e) => {
            document.getElementById('editType').value = e.target.value;
            if(e.target.value === 'town') {
                document.getElementById('descContainer').style.display = 'none';
                document.getElementById('zoomContainer').style.display = 'block';
            } else {
                document.getElementById('descContainer').style.display = 'block';
                document.getElementById('zoomContainer').style.display = 'none';
            }
        });

        map.on('click', (e) => {
            resetSidebar();
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
        });

        function populateSidebar(data, index, type) {
            document.getElementById('editIndex').value = index;
            document.getElementById('editType').value = type;
            document.getElementById('itemType').value = type;
            document.getElementById('title').value = data.title;
            document.getElementById('lat').value = data.lat;
            document.getElementById('lng').value = data.lng;
            
            if(type === 'pin') {
                document.getElementById('description').value = data.description || '';
            } else {
                document.getElementById('minZoom').value = data.minZoom || '-4';
            }
            
            document.getElementById('itemType').dispatchEvent(new Event('change'));
            deleteBtn.style.display = 'block';
        }

        function resetSidebar() {
            form.reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('editType').value = document.getElementById('itemType').value;
            deleteBtn.style.display = 'none';
            document.getElementById('itemType').dispatchEvent(new Event('change'));
        }
        
        cancelBtn.addEventListener('click', resetSidebar);

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const index = document.getElementById('editIndex').value;
            const type = document.getElementById('editType').value;
            
            const newData = {
                title: document.getElementById('title').value,
                lat: parseFloat(document.getElementById('lat').value),
                lng: parseFloat(document.getElementById('lng').value)
            };

            if (type === 'pin') {
                newData.description = document.getElementById('description').value;
                if (index !== '') {
                    localPins[index] = newData;
                } else {
                    localPins.push(newData);
                }
                renderPins();
            } else {
                newData.minZoom = parseInt(document.getElementById('minZoom').value);
                if (index !== '') {
                    localTowns[index] = newData;
                } else {
                    localTowns.push(newData);
                }
                renderTowns();
            }
            resetSidebar();
        });

        deleteBtn.addEventListener('click', () => {
            const index = document.getElementById('editIndex').value;
            const type = document.getElementById('editType').value;
            if (index !== '') {
                if (type === 'pin') {
                    localPins.splice(index, 1);
                    renderPins();
                } else {
                    localTowns.splice(index, 1);
                    renderTowns();
                }
                resetSidebar();
            }
        });

        // --- 7. EXPORT DATA ---
        document.getElementById('exportBtn').addEventListener('click', () => {
            const jsContent = `const savedPins = ${JSON.stringify(localPins, null, 4)};\n\nconst savedTowns = ${JSON.stringify(localTowns, null, 4)};`;
            const blob = new Blob([jsContent], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pins.js';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Initial Boot
        renderPins();
        renderTowns();
        document.getElementById('itemType').dispatchEvent(new Event('change'));
    </script>
</body>
</html>
