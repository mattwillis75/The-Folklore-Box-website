<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Admin - The Folklore Box</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;600&family=Spectral:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Load your saved data -->
    <script src="pins.js"></script>
    
    <style>
        /* --- GLOBAL & LAYOUT STYLES --- */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-red: #cc0000;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            font-family: 'Lato', sans-serif;
            overflow: hidden; 
        }

        /* Master Layout Container */
        .map-wrapper {
            width: 100%;
            max-width: 1600px; 
            padding: 0 2rem; 
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        #app-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1600 / 675.6; 
            background: #000;
        }

        /* The Unified Border Overlay */
        #border-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('border.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none; 
            z-index: 998; 
        }

        /* Map Area */
        #map { 
            position: absolute; 
            top: 4.3%; bottom: 4.88%; left: 2.1%; right: 22.08%; 
            background: #000000; 
            z-index: 1;
        }

        /* Admin Sidebar Area (Placed exactly where the live info-sidebar goes) */
        #info-sidebar { 
            position: absolute; 
            top: 4.3%; bottom: 5.8%; left: 79%; right: 3.2%; 
            padding: 1.5% 2%; 
            box-sizing: border-box; 
            display: flex; flex-direction: column; 
            z-index: 1000; 
            background: rgba(15, 15, 15, 0.95); /* Slight dark background so form inputs pop */
            overflow-y: auto; 
            border-radius: 4px;
        }

        #info-sidebar::-webkit-scrollbar { width: 6px; }
        #info-sidebar::-webkit-scrollbar-track { background: transparent; }
        #info-sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 0px; }

        /* --- ADMIN FORM STYLES --- */
        h2 { font-family: 'Spectral', serif; font-size: 1.5rem; margin: 0 0 10px 0; font-weight: 400; color: #fff; }
        p.help-text { font-size: 0.8rem; color: #888; margin-top: 0; margin-bottom: 15px; line-height: 1.4; }
        
        label { display: block; margin-top: 10px; font-size: 0.85rem; color: #ccc; font-weight: 600;}
        input, select, textarea { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; font-family: 'Lato', sans-serif; background: #222; border: 1px solid #444; color: #fff; border-radius: 3px; font-size: 0.9rem;}
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent-red); }
        
        button { background: var(--accent-red); color: white; border: none; cursor: pointer; font-weight: 600; margin-top: 15px; padding: 10px; border-radius: 3px; font-family: 'Lato', sans-serif; transition: background 0.2s;}
        button:hover { background: #a30000; }
        .secondary-btn { background: #444; }
        .secondary-btn:hover { background: #333; }
        .export-btn { background: #28a745; margin-top: auto; }
        .export-btn:hover { background: #218838; }

        hr { border: none; border-top: 1px solid #333; margin: 20px 0; }

        /* --- MARKER STYLES --- */
        .town-label {
            color: #ffffff; 
            background-color: rgba(60, 60, 60, 0.85); 
            padding: 2px 8px 2px 4px;
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            font-family: 'Spectral', serif;
            font-size: 16px;
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap; 
            cursor: pointer; 
            width: max-content; 
        }
        .town-dot { width: 8px; height: 8px; background: var(--accent-red); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px rgba(204, 0, 0, 0.8); flex-shrink: 0;}
        
        .custom-pin { width: 20px; height: 20px; background: var(--accent-red); border-radius: 50%; border: 2px solid #fff; cursor: pointer; }

    </style>
</head>
<body>

    <main class="map-wrapper">
        <div id="app-container">
            <div id="border-overlay"></div>
            <div id="map"></div>
            
            <!-- Admin Form overlaying the right side -->
            <div id="info-sidebar">
                <h2>Map Admin</h2>
                <p class="help-text">Click map to plot, or select a marker to edit.</p>
                
                <form id="editForm">
                    <input type="hidden" id="editIndex">
                    <input type="hidden" id="editType"> 
                    
                    <label>Marker Type</label>
                    <select id="itemType">
                        <option value="pin">Cryptid / Haunting (Pin)</option>
                        <option value="town">Town / Label</option>
                    </select>

                    <label>Title</label>
                    <input type="text" id="title" required>
                    
                    <div id="descContainer">
                        <label>Description</label>
                        <textarea id="description" rows="3"></textarea>
                    </div>

                    <div id="zoomContainer" style="display:none;">
                        <label>Semantic Zoom Visibility</label>
                        <select id="minZoom">
                            <option value="-4">-4 (Always Visible)</option>
                            <option value="-2">-2 (Zoom Level 1)</option>
                            <option value="-1">-1 (Zoom Level 2)</option>
                            <option value="0">0 (Zoom Level 3)</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;">
                            <label>Latitude</label>
                            <input type="text" id="lat" required readonly style="background: #111; color: #888;">
                        </div>
                        <div style="flex: 1;">
                            <label>Longitude</label>
                            <input type="text" id="lng" required readonly style="background: #111; color: #888;">
                        </div>
                    </div>

                    <button type="submit" id="saveBtn">Save to Map</button>
                    <button type="button" id="deleteBtn" class="secondary-btn" style="display:none;">Delete Marker</button>
                    <button type="button" id="cancelBtn" class="secondary-btn">Clear Form</button>
                </form>
                
                <hr>
                <button type="button" id="exportBtn" class="export-btn">Download pins.js</button>
            </div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Prevent clicks in the sidebar from passing through to the map
        const sidebar = document.getElementById('info-sidebar');
        L.DomEvent.disableClickPropagation(sidebar);
        L.DomEvent.disableScrollPropagation(sidebar);

        // --- 1. DATA INITIALIZATION ---
        let localPins = (typeof savedPins !== 'undefined') ? savedPins : [];
        let localTowns = (typeof savedTowns !== 'undefined') ? savedTowns : [];

        // --- 2. MAP SETUP ---
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -4,
            maxZoom: 2,
            zoomSnap: 0, 
            zoomControl: true,
            attributionControl: false 
        });

        // Map Dimensions (Matching Live Site)
        const mapWidth = 2400;
        const mapHeight = 1352;
        const bounds = [[0, 0], [mapHeight, mapWidth]];

        L.imageOverlay('norfolk-map.jpg', bounds).addTo(map);
        map.fitBounds(bounds);

        // Resize observer to maintain framing
        const resizeObserver = new ResizeObserver(() => {
            map.invalidateSize(); 
            map.fitBounds(bounds);
        });
        resizeObserver.observe(document.getElementById('app-container'));

        // Layer Groups
        const pinsLayerGroup = L.layerGroup().addTo(map);
        const townsLayerGroup = L.layerGroup().addTo(map);
        let semanticTowns = [];

        // --- 3. RENDER LOGIC ---
        function renderPins() {
            pinsLayerGroup.clearLayers();
            localPins.forEach((data, index) => {
                const icon = L.divIcon({ className: 'custom-pin', iconSize: [20, 20], iconAnchor: [10, 10] });
                const marker = L.marker([data.lat, data.lng], { icon: icon }).addTo(pinsLayerGroup);
                
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    populateSidebar(data, index, 'pin');
                });
            });
        }

        function renderTowns() {
            townsLayerGroup.clearLayers();
            semanticTowns = []; 
            
            localTowns.forEach((data, index) => {
                const iconHtml = `<div class="town-label"><span class="town-dot"></span>${data.title}</div>`;
                const textIcon = L.divIcon({ html: iconHtml, className: '', iconSize: null, iconAnchor: [4, 12] });
                
                const marker = L.marker([data.lat, data.lng], { icon: textIcon, zIndexOffset: -50 });
                
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    populateSidebar(data, index, 'town');
                });

                const requiredZoom = (data.minZoom !== undefined && data.minZoom !== null) ? Number(data.minZoom) : -4;
                semanticTowns.push({ marker: marker, minZoom: requiredZoom });
            });
            
            updateSemanticZoom();
        }

        // --- 4. SEMANTIC ZOOM ENGINE (with Bounds logic fix) ---
        function updateSemanticZoom() {
            const currentZoom = map.getZoom();
            const baseZoom = map.getBoundsZoom(bounds); 
            const zoomStepsIn = currentZoom - baseZoom;
            
            semanticTowns.forEach(item => {
                let requiredSteps = 0; 
                if (item.minZoom === -2) requiredSteps = 1; 
                if (item.minZoom === -1) requiredSteps = 2; 
                if (item.minZoom >= 0) requiredSteps = 3;   

                if (zoomStepsIn >= requiredSteps - 0.1) {
                    if (!townsLayerGroup.hasLayer(item.marker)) {
                        townsLayerGroup.addLayer(item.marker);
                    }
                } else {
                    if (townsLayerGroup.hasLayer(item.marker)) {
                        townsLayerGroup.removeLayer(item.marker);
                    }
                }
            });
        }
        map.on('zoomend', updateSemanticZoom);

        // --- 5. SIDEBAR & FORM LOGIC ---
        const form = document.getElementById('editForm');
        const deleteBtn = document.getElementById('deleteBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const itemTypeSelect = document.getElementById('itemType');

        itemTypeSelect.addEventListener('change', (e) => {
            document.getElementById('editType').value = e.target.value;
            if(e.target.value === 'town') {
                document.getElementById('descContainer').style.display = 'none';
                document.getElementById('zoomContainer').style.display = 'block';
            } else {
                document.getElementById('descContainer').style.display = 'block';
                document.getElementById('zoomContainer').style.display = 'none';
            }
        });

        // Click map to get coordinates
        map.on('click', (e) => {
            resetSidebar();
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
        });

        function populateSidebar(data, index, type) {
            document.getElementById('editIndex').value = index;
            document.getElementById('editType').value = type;
            document.getElementById('itemType').value = type;
            document.getElementById('title').value = data.title;
            document.getElementById('lat').value = data.lat;
            document.getElementById('lng').value = data.lng;
            
            if(type === 'pin') {
                document.getElementById('description').value = data.description || '';
            } else {
                document.getElementById('minZoom').value = data.minZoom || '-4';
            }
            
            document.getElementById('itemType').dispatchEvent(new Event('change'));
            deleteBtn.style.display = 'block';
        }

        function resetSidebar() {
            form.reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('editType').value = document.getElementById('itemType').value;
            deleteBtn.style.display = 'none';
            document.getElementById('itemType').dispatchEvent(new Event('change'));
        }
        
        cancelBtn.addEventListener('click', resetSidebar);

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const index = document.getElementById('editIndex').value;
            const type = document.getElementById('editType').value;
            
            const newData = {
                title: document.getElementById('title').value,
                lat: parseFloat(document.getElementById('lat').value),
                lng: parseFloat(document.getElementById('lng').value)
            };

            if (type === 'pin') {
                newData.description = document.getElementById('description').value;
                // Note: The admin currently defaults to simple pins. If you want to preview
                // 'Cryptid', 'UFO', etc. icons here eventually, add a category dropdown to this form!
                if (index !== '') {
                    localPins[index] = newData;
                } else {
                    localPins.push(newData);
                }
                renderPins();
            } else {
                newData.minZoom = parseInt(document.getElementById('minZoom').value);
                if (index !== '') {
                    localTowns[index] = newData;
                } else {
                    localTowns.push(newData);
                }
                renderTowns();
            }
            resetSidebar();
        });

        deleteBtn.addEventListener('click', () => {
            const index = document.getElementById('editIndex').value;
            const type = document.getElementById('editType').value;
            if (index !== '') {
                if (type === 'pin') {
                    localPins.splice(index, 1);
                    renderPins();
                } else {
                    localTowns.splice(index, 1);
                    renderTowns();
                }
                resetSidebar();
            }
        });

        // --- 6. EXPORT DATA ---
        document.getElementById('exportBtn').addEventListener('click', () => {
            const jsContent = `const savedPins = ${JSON.stringify(localPins, null, 4)};\n\nconst savedTowns = ${JSON.stringify(localTowns, null, 4)};`;
            const blob = new Blob([jsContent], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pins.js';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Initial Boot
        renderPins();
        renderTowns();
        document.getElementById('itemType').dispatchEvent(new Event('change'));
    </script>
</body>
</html>
