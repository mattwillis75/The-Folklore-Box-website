<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | The Folklore Box</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;600&family=Spectral:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styles */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-red: #cc0000;
            --header-bg: rgba(0, 0, 0, 0.85);
        }
        body {
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }
        h1, h2, h3 { font-family: 'Spectral', serif; font-weight: 400; color: #ffffff; }
        
        /* Header & Nav */
        header { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 3rem; background: var(--header-bg); border-bottom: 1px solid #333333; z-index: 1000; box-sizing: border-box; backdrop-filter: blur(8px); }
        .logo img { max-width: 180px; height: auto; }
        
        nav ul { list-style: none; display: flex; align-items: center; gap: 2rem; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #ffffff; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; transition: color 0.3s ease; }
        nav a:hover { color: var(--accent-red); }
        
        #cart-toggle { color: var(--accent-red); border: 1px solid var(--accent-red); padding: 0.5rem 1rem; border-radius: 3px; }
        #cart-toggle:hover { background: var(--accent-red); color: #ffffff; }

        /* Mobile Menu */
        .mobile-menu-toggle { display: none; flex-direction: column; cursor: pointer; gap: 5px; z-index: 1005; }
        .mobile-menu-toggle span { width: 25px; height: 3px; background-color: #ffffff; transition: all 0.3s ease; border-radius: 3px; }
        @media (max-width: 850px) {
            .mobile-menu-toggle { display: flex; }
            nav ul { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background-color: rgba(0, 0, 0, 0.95); padding: 1rem 0; }
            nav ul.mobile-active { display: flex; }
        }

        /* Product Page Layout */
        main { padding-top: 120px; min-height: 100vh; max-width: 1200px; margin: 0 auto; padding-bottom: 4rem; }
        .product-container { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; padding: 2rem; }
        @media (max-width: 800px) { .product-container { grid-template-columns: 1fr; } }
        
        .product-image-container img { width: 100%; height: auto; border: 1px solid #333; border-radius: 4px; }
        .product-info h1 { font-size: 2.5rem; margin-top: 0; }
        .product-description { font-size: 1.1rem; color: #ccc; margin-bottom: 2rem; }
        
        /* Options & Price */
        .options-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; color: #aaa; }
        select { width: 100%; padding: 1rem; background: #111; color: #fff; border: 1px solid #333; border-radius: 3px; margin-bottom: 2rem; cursor: pointer; }
        
        .price-breakdown { background: #0a0a0a; border: 1px solid #222; padding: 1.5rem; border-radius: 4px; margin-bottom: 2rem; }
        .price-row { display: flex; justify-content: space-between; color: #aaa; margin-bottom: 0.5rem; }
        .price-total { display: flex; justify-content: space-between; font-family: 'Spectral', serif; font-size: 1.8rem; color: var(--accent-red); border-top: 1px solid #333; margin-top: 1rem; padding-top: 1rem; }
        
        .btn { display: block; background: var(--accent-red); color: #fff; padding: 1.2rem; text-align: center; border: none; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; width: 100%; }
        
        /* Slide-Out Cart */
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 1001; display: none; }
        .cart-overlay.active { display: block; }
        .cart-sidebar { position: fixed; top: 0; right: -450px; width: 450px; max-width: 100vw; height: 100vh; background: #0a0a0a; border-left: 1px solid #222; z-index: 1002; transition: right 0.4s; padding: 2rem; display: flex; flex-direction: column; box-sizing: border-box; }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .cart-header h2 { margin: 0; font-size: 2rem; }
        .close-cart { font-size: 2.5rem; cursor: pointer; color: #fff; line-height: 1; transition: color 0.3s; }
        .close-cart:hover { color: var(--accent-red); }
        .cart-items-container { flex-grow: 1; overflow-y: auto; margin-bottom: 1rem; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #222; }
        .cart-item-title { flex-grow: 1; padding-right: 1rem; font-weight: 600; }
        .remove-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 1.5rem; padding: 0 0 0 1rem; transition: color 0.2s; }
        .remove-btn:hover { color: var(--accent-red); }
        .cart-footer { border-top: 1px solid #333; padding-top: 1.5rem; }
        .cart-total { font-size: 1.8rem; text-align: right; margin-bottom: 1.5rem; font-family: 'Spectral', serif; }

        /* Footer */
        footer { background: #000000; color: #ffffff; padding: 4rem 2rem; text-align: center; border-top: 1px solid #222; }
        footer a { color: #ffffff; text-decoration: none; margin: 0 1rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
        footer a:hover { color: var(--accent-red); }
        .social-links { margin-bottom: 2rem; }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="logo"><a href="index.html"><img src="./The-folklore-box-logo.png" alt="The Folklore Box Logo"></a></div>
        <div class="mobile-menu-toggle" id="mobile-toggle"><span></span><span></span><span></span></div>
        <nav>
            <ul id="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="#" id="cart-toggle">Cart (0)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="product-container" id="product-container">
            <!-- Loading -->
        </div>
    </main>

    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header"><h2>Your Cart</h2><span class="close-cart" id="close-cart">&times;</span></div>
        <div class="cart-items-container" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total" id="cart-total">Total: £0.00</div>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="social-links">
            <a href="https://instagram.com/the_folklore_box" target="_blank">Instagram: @the_folklore_box</a> | 
            <a href="https://facebook.com/thefolklorebox" target="_blank">Facebook: @thefolklorebox</a>
        </div>
        <div style="margin-bottom: 2rem;">
            <a href="shop.html">Shop</a>
            <a href="wholesale.html">Wholesale Enquiries</a>
            <a href="contact.html">Contact</a>
        </div>
        <p style="font-size: 0.8rem; color: #555; font-family: 'Lato', sans-serif;">
            &copy; 2026 The Folklore Box by Matt Willis. All rights reserved.
        </p>
    </footer>

    <!-- PAYPAL JAVASCRIPT SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID_HERE&currency=GBP"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const productContainer = document.getElementById('product-container');
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            let foundProduct = null;

            // Fetch and Parse
            try {
                const response = await fetch('products.txt', { cache: 'no-store' });
                const text = await response.text();
                const rawItems = text.split('---');

                for (const rawItem of rawItems) {
                    if (rawItem.trim() === '') continue;
                    const lines = rawItem.trim().split('\n');
                    let product = { shippingOptions: [] };
                    lines.forEach(line => {
                        const sepIndex = line.indexOf(':');
                        if (sepIndex > -1) {
                            const key = line.slice(0, sepIndex).trim().toLowerCase();
                            const value = line.slice(sepIndex + 1).trim();
                            if (key === 'title') { product.title = value; product.id = value.toLowerCase().replace(/[^a-z0-9]+/g, '-'); }
                            else if (key === 'image') product.image = value;
                            else if (key === 'description') product.description = value;
                            else if (key === 'item cost') product.basePrice = parseFloat(value);
                            else if (key === 'uk standard delivery') product.shippingOptions.push({ label: 'UK Standard', cost: parseFloat(value) });
                            else if (key === 'uk tracked & signed') product.shippingOptions.push({ label: 'UK Tracked & Signed', cost: parseFloat(value) });
                            else if (key === 'international delivery') product.shippingOptions.push({ label: 'International', cost: parseFloat(value) });
                        }
                    });
                    if (product.id === productId) { foundProduct = product; break; }
                }

                if (foundProduct) {
                    let shippingSelectHTML = `<select id="shipping-select">`;
                    foundProduct.shippingOptions.forEach((opt, index) => { shippingSelectHTML += `<option value="${index}">${opt.label}</option>`; });
                    shippingSelectHTML += `</select>`;

                    productContainer.innerHTML = `
                        <div class="product-image-container"><img src="${foundProduct.image}" alt="${foundProduct.title}"></div>
                        <div class="product-info">
                            <h1>${foundProduct.title}</h1>
                            <p class="product-description">${foundProduct.description}</p>
                            <div class="options-group">
                                <label for="shipping-select">Select Postal Option</label>
                                ${shippingSelectHTML}
                            </div>
                            <div class="price-breakdown">
                                <div class="price-row"><span>Item Cost:</span><span>£${foundProduct.basePrice.toFixed(2)}</span></div>
                                <div class="price-row"><span>Postage Cost:</span><span id="display-postage">£${foundProduct.shippingOptions[0].cost.toFixed(2)}</span></div>
                                <div class="price-total"><span>Total:</span><span id="display-total">£${(foundProduct.basePrice + foundProduct.shippingOptions[0].cost).toFixed(2)}</span></div>
                            </div>
                            <button class="btn" id="add-to-cart-btn">Add to Cart</button>
                        </div>
                    `;

                    // Update prices
                    const shippingSelect = document.getElementById('shipping-select');
                    shippingSelect.addEventListener('change', (e) => {
                        const selectedShipping = foundProduct.shippingOptions[e.target.value];
                        document.getElementById('display-postage').textContent = `£${selectedShipping.cost.toFixed(2)}`;
                        document.getElementById('display-total').textContent = `£${(foundProduct.basePrice + selectedShipping.cost).toFixed(2)}`;
                    });
                }
            } catch (err) { productContainer.innerHTML = "Error loading product."; }

            // --- CART LOGIC (With Event Delegation) ---
            let cart = JSON.parse(localStorage.getItem('folkloreCart')) || [];
            
            const cartSidebar = document.getElementById('cart-sidebar');
            const cartOverlay = document.getElementById('cart-overlay');
            const cartToggle = document.getElementById('cart-toggle');
            const closeCartBtn = document.getElementById('close-cart');

            const openCart = () => { cartSidebar.classList.add('open'); cartOverlay.classList.add('active'); };
            const closeCart = () => { cartSidebar.classList.remove('open'); cartOverlay.classList.remove('active'); };

            cartToggle.addEventListener('click', (e) => { e.preventDefault(); openCart(); });
            closeCartBtn.addEventListener('click', closeCart);
            cartOverlay.addEventListener('click', closeCart);

            document.addEventListener('click', (e) => {
                if (e.target && e.target.id === 'add-to-cart-btn') {
                    const shippingSelect = document.getElementById('shipping-select');
                    const selected = foundProduct.shippingOptions[shippingSelect.value];
                    cart.push({ title: `${foundProduct.title} (${selected.label})`, price: foundProduct.basePrice + selected.cost });
                    localStorage.setItem('folkloreCart', JSON.stringify(cart));
                    updateCartUI();
                    openCart();
                }
            });

            function updateCartUI() {
                const container = document.getElementById('cart-items');
                container.innerHTML = '';
                let total = 0;
                if (cart.length === 0) {
                    container.innerHTML = '<p style="color: #777; font-style: italic;">Your cart is currently empty.</p>';
                } else {
                    cart.forEach((item, index) => {
                        total += item.price;
                        container.innerHTML += `<div class="cart-item"><div class="cart-item-title">${item.title}</div><div>£${item.price.toFixed(2)}</div><button class="remove-btn" onclick="removeFromCart(${index})">&times;</button></div>`;
                    });
                }
                document.getElementById('cart-total').textContent = `Total: £${total.toFixed(2)}`;
                document.getElementById('cart-toggle').textContent = `Cart (${cart.length})`;
            }
            window.removeFromCart = (i) => { cart.splice(i, 1); localStorage.setItem('folkloreCart', JSON.stringify(cart)); updateCartUI(); };
            
            // Mobile Menu
            document.getElementById('mobile-toggle').addEventListener('click', () => {
                document.getElementById('nav-list').classList.toggle('mobile-active');
            });
            
            // --- PAYPAL INITIALIZATION ---
            paypal.Buttons({
                style: {
                    color: 'gold',
                    shape: 'rect',
                    label: 'checkout',
                    layout: 'vertical'
                },
                createOrder: function(data, actions) {
                    let currentTotal = cart.reduce((sum, item) => sum + item.price, 0);
                    
                    if (currentTotal === 0) {
                        alert("Your cart is empty!");
                        return;
                    }

                    return actions.order.create({
                        purchase_units: [{
                            amount: {
                                currency_code: 'GBP',
                                value: currentTotal.toFixed(2)
                            }
                        }],
                        application_context: {
                            shipping_preference: 'GET_FROM_FILE' // Forces PayPal to collect/confirm delivery address
                        }
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        alert('Payment successful! Thank you for your order, ' + details.payer.name.given_name + '.');
                        cart = []; 
                        localStorage.setItem('folkloreCart', JSON.stringify(cart)); 
                        updateCartUI();
                        closeCart();
                    });
                },
                onError: function(err) {
                    console.error('PayPal Checkout Error:', err);
                    alert('There was an issue connecting to PayPal. Please try again.');
                }
            }).render('#paypal-button-container');

            updateCartUI();
        });
    </script>
</body>
</html>
