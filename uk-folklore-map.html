<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Folklore Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <!-- Spectral Font -->
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-red: #cc0000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Main Container framing the border graphic */
        #app-container {
            position: relative;
            width: 100%;
            max-width: 1600px;
            aspect-ratio: 1600 / 675.6; /* Reverted to the border graphic's proportions */
            background: #000;
        }

        /* The Map Container (positioned to fit inside the border graphic) */
        #map {
            position: absolute;
            top: 4.3%;
            left: 2.1%;
            width: 74.8%;
            height: 91.4%;
            background-color: #ffffff; /* White base layer */
            z-index: 1;
        }

        /* --- Map Town Labels --- */
        .town-label {
            color: #000000; /* Black text for readability */
            font-family: 'Spectral', serif;
            font-size: 16px;
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap; /* Prevents text from breaking lines on resize */
            pointer-events: none; 
        }
        
        .town-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-red);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px rgba(204, 0, 0, 0.8);
            flex-shrink: 0;
        }

        /* Mobile Breakpoint Fix */
        @media (max-width: 1100px) {
            /* Add any specific mobile UI adjustments here */
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- The interactive map window -->
        <div id="map"></div>
        
        <!-- Assuming you have an image element for the outer border here -->
        <!-- <img src="border.png" class="map-border" alt="Map Border" style="position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10;"> -->
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <script>
        // 1. Initialize the map using CRS.Simple for a flat image coordinate system
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -3,
            maxZoom: 2,
            zoomControl: true
        });

        // 2. New Map Image Dimensions
        const mapWidth = 2326;
        const mapHeight = 1434; 
        const bounds = [[0, 0], [mapHeight, mapWidth]];

        // Attach the image. Ensure 'norfolk-map_2.jpg' matches your local filename exactly
        L.imageOverlay('norfolk-map_2.jpg', bounds).addTo(map);
        map.setMaxBounds(bounds);
        map.fitBounds(bounds);

        // ==========================================
        // INSERT YOUR FOLKLORE PINS HERE
        // ==========================================
        /* Example:
        const pinCollection = [ { title: "Black Shuck", ... } ];
        pinCollection.forEach((pin, index) => { 
            renderPin(pin, index); 
        });
        */


        // ==========================================
        // SEMANTIC ZOOM: TOWN LABELS & PIXEL TRANSLATOR
        // ==========================================
        
        // 1. Town Registry (Real-world Lat/Long coordinates)
        const townRegistry = [
            { title: "Norwich", lat: 52.63, lng: 1.29, minZoom: -2 },
            { title: "King's Lynn", lat: 52.75, lng: 0.39, minZoom: -1 },
            { title: "Great Yarmouth", lat: 52.60, lng: 1.72, minZoom: -1 },
            { title: "Cromer", lat: 52.93, lng: 1.30, minZoom: 0 },
            { title: "Thetford", lat: 52.41, lng: 0.74, minZoom: 0 },
            { title: "Walsingham", lat: 52.89, lng: 0.87, minZoom: 1 },
            { title: "Blakeney", lat: 52.95, lng: 1.02, minZoom: 1 }
        ];

        const townsLayerGroup = L.layerGroup();

        // 2. The CORRECTED Pixel Translator & Marker Generator
        townRegistry.forEach(town => {
            // Calibrated against the Norwich purple dot
            const pixelX = (town.lng + 0.15) * 1066;
            const pixelY = (town.lat - 52.22) * 1573;

            const iconHtml = `<div class="town-label"><span class="town-dot"></span>${town.title}</div>`;
            
            const textIcon = L.divIcon({
                html: iconHtml,
                className: '', 
                iconSize: [120, 20], 
                iconAnchor: [4, 10] // Centers the red dot precisely on the coordinate
            });

            // Leaflet CRS.Simple requires [Y, X] format
            const marker = L.marker([pixelY, pixelX], { 
                icon: textIcon,
                zIndexOffset: -50 // Safely between the map background and the folklore pins
            });

            // Attach the target zoom level to the marker object
            marker.targetMinZoom = town.minZoom;
            marker.addTo(townsLayerGroup);
        });

        // 3. The Zoom Listener
        map.on('zoomend', function() {
            const currentZoom = map.getZoom();
            
            // Only show towns if their specific minZoom requirement is met
            townsLayerGroup.eachLayer(function(marker) {
                if (currentZoom >= marker.targetMinZoom) {
                    if (!map.hasLayer(marker)) {
                        marker.addTo(map);
                    }
                } else {
                    if (map.hasLayer(marker)) {
                        marker.remove();
                    }
                }
            });
        });

        // Force an initial check when the page loads
        map.fire('zoomend');
    </script>
</body>
</html>
